<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripCollab - Iniciar Sesión</title>
    <meta name="description" content="Inicia sesión en TripCollab y planifica tus viajes en colaboración con amigos.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Pruebas/styles.css">
</head>
<body>

    <!-- Fondo animado con partículas/esferas -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="login-container">

        <!-- Logo + tagline -->
        <div class="brand">
            <div class="logo-icon">✈</div>
            <h1 class="logo">TripCollab</h1>
            <p class="tagline">Viaja. Colabora. Descubre.</p>
        </div>

        <!-- Card glassmorphism -->
        <div class="login-box">
            <h2>Bienvenido de vuelta</h2>
            <p class="subtitle">Accede a tus viajes y planes</p>

            <div class="input-group">
                <span class="input-icon">📧</span>
                <input type="email" id="email" placeholder="Correo electrónico" autocomplete="email">
            </div>

            <div class="input-group">
                <span class="input-icon">🔒</span>
                <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password">
            </div>

            <div class="forgot-row">
                <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </div>

            <button id="login-btn" onclick="login()">
                <span class="btn-text">Entrar</span>
                <span class="btn-arrow">→</span>
            </button>

            <div class="divider"><span>o continúa con</span></div>

            <div class="social-row">
                <button class="social-btn" id="btn-google" title="Google">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M5.26 9.77A7 7 0 0 1 12 5c1.68 0 3.19.6 4.37 1.57L19.9 3A11.97 11.97 0 0 0 12 0C7.38 0 3.37 2.7 1.38 6.64l3.88 3.13Z"/><path fill="#34A853" d="M16.04 18.01A7 7 0 0 1 12 19c-3.35 0-6.2-2.34-7.12-5.5L1 16.64A11.97 11.97 0 0 0 12 24c3.24 0 5.98-1.2 8.1-3.14l-4.06-2.85Z"/><path fill="#FBBC05" d="M4.88 13.5A7.05 7.05 0 0 1 5 12c0-.52.07-1.02.18-1.5L1.38 7.36A11.97 11.97 0 0 0 0 12c0 1.69.35 3.3.97 4.76l3.91-3.26Z"/><path fill="#4285F4" d="M23.49 12.27c0-.79-.07-1.56-.2-2.27H12v4.51h6.47a5.53 5.53 0 0 1-2.4 3.6l4.06 2.85C22.35 18.84 23.49 15.82 23.49 12.27Z"/></svg>
                    Continuar con Google
                </button>
            </div>

            <p class="register-text">¿No tienes cuenta? <a href="#" id="register-link">Regístrate gratis</a></p>
        </div>

    </div>

<script src="app.js"></script>
</body>
</html>
