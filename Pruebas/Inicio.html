<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripCollab — Mis Viajes</title>
    <meta name="description" content="Gestiona y planifica todos tus viajes colaborativos en TripCollab.">
    <link rel="stylesheet" href="styles.css">
    

</head>

<body class="dashboard-body">

    <!-- Saltar al contenido principal (accesibilidad teclado) -->
    <a href="#dash-main" class="skip-link">Saltar al contenido principal</a>

    <!-- Fondo animado (decorativo, invisible para lectores de pantalla) -->
    <div class="bg-orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar" id="navbar" aria-label="Navegación principal">
        <div class="nav-inner">
            <a href="viajes.html" class="nav-brand" aria-label="TripCollab — Ir a mis viajes">
                <span class="nav-logo-icon" aria-hidden="true">✈</span>
                <span class="nav-logo-text">TripCollab</span>
            </a>

            <div class="nav-center">
                <div class="search-bar" id="search-bar" role="search">
                    <label for="search-input" class="sr-only">Buscar viaje</label>
                    <span class="search-icon" aria-hidden="true">🔍</span>
                    <input type="search" id="search-input" placeholder="Buscar viaje…" autocomplete="off"
                        aria-label="Buscar entre tus viajes">
                </div>
            </div>

            <div class="nav-right">
                <!-- Avatar como botón para accesibilidad táctil/teclado -->
                <button class="nav-avatar" id="nav-avatar" aria-label="Mi perfil" title="Mi perfil">
                    <span id="avatar-initials" aria-hidden="true">?</span>
                </button>

                <button class="nav-logout" id="btn-logout" aria-label="Cerrar sesión" onclick="logout()">
                    <span>Salir</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="dash-main" id="dash-main" tabindex="-1">

        <!-- Header section -->
        <section class="dash-header" aria-labelledby="page-title">
            <div class="dash-header-text">
                <h1 class="dash-title" id="page-title">Mis Viajes</h1>
                <!-- aria-live para que el contador se anuncie cuando cambie -->
                <p class="dash-subtitle" id="viajes-count" aria-live="polite" aria-atomic="true">
                    Cargando tus aventuras…
                </p>
            </div>
            <button class="btn-crear" id="btn-crear-viaje" aria-haspopup="dialog" aria-controls="modal-crear"
                onclick="abrirModalCrear()">
                <span class="btn-crear-icon" aria-hidden="true">＋</span>
                <span>Nuevo viaje</span>
            </button>
        </section>

        <!-- Filter tabs -->
        <div class="filter-tabs" id="filter-tabs" role="group" aria-label="Filtrar viajes por rol">
            <button class="tab active" data-filter="todos" aria-pressed="true" onclick="filtrar(this)">Todos</button>
            <button class="tab" data-filter="creador" aria-pressed="false" onclick="filtrar(this)">Creados por
                mí</button>
            <button class="tab" data-filter="admin" aria-pressed="false" onclick="filtrar(this)">Admin</button>
            <button class="tab" data-filter="colaborador" aria-pressed="false"
                onclick="filtrar(this)">Colaborador</button>
        </div>

        <!-- Cards grid -->
        <!-- aria-live: cuando se llena con tarjetas reales, los lectores lo anuncian -->
        <div class="viajes-grid" id="viajes-grid" aria-label="Lista de viajes" aria-live="polite" aria-busy="true">
            <!-- Skeletons mientras carga -->
            <div class="viaje-card skeleton-card" aria-hidden="true"></div>
            <div class="viaje-card skeleton-card" aria-hidden="true"></div>
            <div class="viaje-card skeleton-card" aria-hidden="true"></div>
        </div>

        <!-- Empty state (oculto por defecto) -->
        <div class="empty-state hidden" id="empty-state" role="status">
            <div class="empty-icon" aria-hidden="true">🗺️</div>
            <h2>Aún no tienes viajes</h2>
            <p>Crea tu primer viaje y empieza a planificar tu próxima aventura.</p>
            <button class="btn-crear" aria-haspopup="dialog" aria-controls="modal-crear" onclick="abrirModalCrear()">
                <span class="btn-crear-icon" aria-hidden="true">＋</span>
                <span>Crear mi primer viaje</span>
            </button>
        </div>

    </main>

    <!-- ===== MODAL: CREAR VIAJE ===== -->
    <div class="modal-overlay hidden" id="modal-crear" role="dialog" aria-modal="true" aria-labelledby="modal-title"
        aria-describedby="modal-desc">
        <div class="modal-box" id="modal-box">
            <div class="modal-header">
                <h2 id="modal-title">
                    <span aria-hidden="true">✈ </span>Nuevo Viaje
                </h2>
                <button class="modal-close" id="modal-close-btn" onclick="cerrarModalCrear()"
                    aria-label="Cerrar ventana de nuevo viaje">
                    <span aria-hidden="true">✕</span>
                </button>
            </div>

            <p id="modal-desc" class="sr-only">
                Rellena los campos para crear un nuevo viaje colaborativo.
            </p>

            <div class="modal-body">
                <!-- Título -->
                <div class="input-group">
                    <label for="nuevo-titulo" class="sr-only">Título del viaje</label>
                    <span class="input-icon" aria-hidden="true">📌</span>
                    <input type="text" id="nuevo-titulo" placeholder="Título del viaje" maxlength="80"
                        autocomplete="off" aria-required="true">
                </div>

                <!-- Destino -->
                <div class="input-group">
                    <label for="nuevo-destino" class="sr-only">Destino</label>
                    <span class="input-icon" aria-hidden="true">🌍</span>
                    <input type="text" id="nuevo-destino" placeholder="Destino" maxlength="80" autocomplete="off"
                        aria-required="true">
                </div>

                <!-- Fechas -->
                <div class="modal-dates">
                    <div class="input-group">
                        <label for="nuevo-fecha-inicio" class="sr-only">Fecha de inicio</label>
                        <span class="input-icon" aria-hidden="true">📅</span>
                        <input type="date" id="nuevo-fecha-inicio" aria-label="Fecha de inicio del viaje"
                            aria-required="true">
                    </div>
                    <div class="input-group">
                        <label for="nuevo-fecha-fin" class="sr-only">Fecha de fin</label>
                        <span class="input-icon" aria-hidden="true">🏁</span>
                        <input type="date" id="nuevo-fecha-fin" aria-label="Fecha de fin del viaje"
                            aria-required="true">
                    </div>
                </div>

                <!-- Error de validación anunciado al lector -->
                <p class="form-error hidden" id="modal-error" role="alert" aria-live="assertive"></p>

                <button class="btn-crear btn-modal-crear" id="btn-confirmar-crear" onclick="crearViaje()">
                    <span class="btn-crear-icon" aria-hidden="true">＋</span>
                    <span>Crear viaje</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast hidden" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script src="dashboard.js"></script>
</body>

</html>
