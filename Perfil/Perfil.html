<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripCollab — Mi Perfil</title>
    <link rel="stylesheet" href="../Inicio/css/Inicio.css">
    <link rel="stylesheet" href="css/Perfil.css">
</head>

<body class="dashboard-body">

    <div class="bg-orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar" id="navbar">
        <div class="nav-inner">
            <a href="../Inicio/Inicio.html" class="nav-brand">
                <span class="nav-logo-icon">✈</span>
                <span class="nav-logo-text">TripCollab</span>
            </a>

            <div class="nav-center"></div>

            <div class="nav-right">
                <div class="user-dropdown-container">
                    <button class="nav-avatar" id="nav-avatar" onclick="toggleDropdown()">
                        <span id="avatar-initials">JD</span>
                    </button>
                    <div class="user-dropdown hidden" id="user-dropdown">
                        <a href="Perfil.html" class="dropdown-item">
                            <span class="dropdown-icon">👤</span> Ver perfil
                        </a>
                        <a href="../Inicio/Inicio.html" class="dropdown-item">
                            <span class="dropdown-icon">🗺️</span> Mis planes
                        </a>
                        <a href="#" class="dropdown-item">
                            <span class="dropdown-icon">⭐</span> Mis favoritos
                        </a>
                        <div class="dropdown-divider"></div>
                        <button class="dropdown-item logout-item" onclick="logout()">
                            <span class="dropdown-icon">🚪</span> Cerrar sesión
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="dash-main">
        <section class="profile-header">
            <div class="profile-avatar-large">JD</div>
            <div class="profile-title-group">
                <h1 id="display-name">Juan David</h1>
                <p class="text-muted">Miembro desde Mayo 2024</p>
            </div>
        </section>

        <div class="profile-grid">
            <!-- Columna Izquierda: Estadísticas -->
            <div class="profile-card stats-card">
                <h3>Resumen de viajes</h3>
                <div class="stats-row">
                    <div class="stat-item">
                        <span class="stat-value" id="count-pendientes">0</span>
                        <span class="stat-label">Pendientes</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="count-realizados">0</span>
                        <span class="stat-label">Realizados</span>
                    </div>
                </div>
            </div>

            <!-- Columna Derecha: Información Editable -->
            <div class="profile-card info-card">
                <h3>Información Personal</h3>
                <div class="edit-group">
                    <label for="input-name">Nombre</label>
                    <input type="text" id="input-name" value="Juan David">
                </div>
                <div class="edit-group">
                    <label for="input-birth">Cumpleaños</label>
                    <input type="date" id="input-birth" value="1995-08-15">
                </div>
                <div class="edit-group">
                    <label for="input-payment">Método de pago</label>
                    <select id="input-payment">
                        <option value="visa">Visa **** 4242</option>
                        <option value="mastercard">Mastercard **** 8888</option>
                        <option value="paypal">PayPal (jd@example.com)</option>
                    </select>
                </div>
                <button class="btn-crear" onclick="saveProfile()" style="margin-top: 20px; width: 100%; justify-content: center;">
                    Guardar cambios
                </button>
            </div>
        </div>
    </main>

    <button class="lang-toggle" id="lang-toggle" onclick="toggleLanguage()">
        <span id="lang-text">ES</span>
        <span class="lang-flag" id="lang-flag">🇪🇸</span>
    </button>

    <script src="../Inicio/js/Inicio.js"></script>
    <script src="../js/i18n.js"></script>
    <script src="js/Perfil.js"></script>
</body>

</html>
