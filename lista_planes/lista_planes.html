<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Planes de Viaje | Planificador Premium</title>
    <meta name="description"
        content="Organiza tus próximas aventuras con nuestro planificador de viajes de alta gama. Explora, gestiona y disfruta de tus destinos favoritos.">
    <link rel="stylesheet" href="css/lista_planes.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">TriCollab</div>
            <nav>
                <!-- Navigation links can be added here if needed -->
            </nav>
        </header>

        <main>
            <section class="hero">
                <h1 style="font-size: 3.5rem; margin-bottom: 1rem; letter-spacing: -2px;">Lista de Viajes</h1>
                <p style="color: var(--text-secondary); margin-bottom: 3rem; max-width: 600px;">
                    Gestiona tus itinerarios, descubre nuevos destinos y mantén todos tus recuerdos de viaje en un solo
                    lugar con nuestra interfaz inteligente.
                </p>
            </section>

            <div class="controls">
                <div class="search-wrapper">
                    <input type="text" id="search-input" placeholder="Buscar destino o plan...">
                </div>
                <div class="filters">
                    <!-- Filters can be added here -->
                </div>
            </div>

            <div class="trip-grid" id="trip-grid">
                <!-- Trip cards will be injected here by JS -->
            </div>
        </main>
    </div>

    <!-- Details Modal -->
    <div id="details-modal" class="modal">
        <div class="modal-content" style="max-width: 800px; max-height: 90vh; overflow-y: auto; padding: 0;">
            <div id="modal-body">
                <!-- Dynamic content -->
            </div>
            <div style="padding: 2rem; border-top: 1px solid var(--card-border);">
                <button id="close-details" class="btn-primary" style="width: 100%; justify-content: center;">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="js/lista_planes.js"></script>
</body>

</html>
